<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bono/Tahvil Getiri Hesaplama</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eceef1;
    --bg2:#e4e7eb;
    --ink:#111418;
    --card:#ffffff;
    --line:#d3d8df;
    --purple:#0a2a66;
    --purple-d:#071f4d;
    --purple-l:#eaeef6;
    --accent:#0a2a66;
    --gold:#b8860b;
    --muted:#5b6675;
    --tl:#0a2a66;
    --yp:#1565a8;
    --danger:#c0392b;
    --win:#1a7a4c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'JetBrains Mono','Roboto Mono','Courier New',monospace;
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    padding:0;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 80px}
  header{
    padding-bottom:16px;margin-bottom:8px;border-bottom:2px solid var(--purple);
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  header h1{font-size:21px;letter-spacing:.5px;font-weight:700;text-transform:uppercase;color:var(--accent)}
  header .sub{font-size:11px;letter-spacing:2px;color:var(--muted);font-weight:500;margin-top:3px;text-transform:uppercase}
  /* tabs */
  .tabs{display:flex;gap:0;margin:22px 0 26px;border:1px solid var(--purple)}
  .tab{
    flex:1;padding:13px;text-align:center;cursor:pointer;background:var(--card);
    font-family:inherit;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
    border:none;color:var(--muted);transition:.12s;
  }
  .tab+.tab{border-left:1px solid var(--purple)}
  .tab:hover{color:var(--accent);background:var(--purple-l)}
  .tab.active{background:var(--purple);color:#fff}
  .panel{display:none}
  .panel.active{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  /* generic */
  label{display:block;font-size:11px;letter-spacing:1px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase}
  input,select{
    width:100%;padding:11px 13px;border:1px solid var(--line);background:var(--card);
    font-family:inherit;font-size:15px;color:var(--ink);border-radius:0;transition:.12s;
  }
  input:focus,select:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 1px var(--purple)}
  input::placeholder{color:#9aa3b0}
  .field{margin-bottom:16px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .btn{
    background:var(--purple);color:#fff;border:none;padding:13px 24px;cursor:pointer;
    font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:0;
    transition:.12s;
  }
  .btn:hover{background:var(--accent);box-shadow:0 0 12px rgba(255,140,0,.5)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--purple);box-shadow:none}
  .btn.ghost:hover{background:var(--purple-l);box-shadow:none}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger);padding:7px 14px;font-size:12px}
  .btn.danger:hover{background:var(--danger);color:#fff}
  /* currency choice */
  .cur-choice{display:flex;gap:14px;margin-bottom:26px}
  .cur-pill{
    flex:1;padding:28px 22px;border:1px solid var(--line);background:var(--card);text-align:center;cursor:pointer;
    transition:.12s;border-radius:0;
  }
  .cur-pill:hover{border-color:var(--purple);background:var(--purple-l);box-shadow:0 0 12px rgba(255,140,0,.2)}
  .cur-pill .big{font-size:26px;font-weight:700;letter-spacing:1px;color:var(--accent)}
  .cur-pill .lbl{font-size:11px;letter-spacing:1px;color:var(--muted);margin-top:6px;font-weight:500;text-transform:uppercase}
  .cur-pill.sel{border-color:var(--purple);border-width:1px;background:var(--purple-l);box-shadow:0 0 0 1px var(--purple),0 0 16px rgba(255,140,0,.25)}
  .cur-pill.sel .big{color:var(--gold)}
  .cur-pill.sel.yp{border-color:var(--yp);background:var(--purple-l)}
  .cur-pill.sel.yp .big{color:var(--gold)}
  /* tables */
  table{width:100%;border-collapse:collapse;margin-top:8px;background:var(--card);font-size:13px;border:1px solid var(--line)}
  th,td{padding:11px 13px;text-align:left;border-bottom:1px solid var(--line)}
  th{background:var(--purple);color:#fff;font-size:12.5px;letter-spacing:.5px;text-transform:uppercase;font-weight:700}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  tr.total td{background:#e7faf0;font-weight:800;border-top:2px solid var(--purple);color:#079d4a;font-size:15px}
  tr.subtotal td{background:#fff4e0;font-weight:800;border-top:1px solid var(--gold);color:#d97e00}
  tr.invest td{background:#fdeae8;font-weight:800;color:#e02517}
  .badge{display:inline-block;padding:2px 8px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;border:1px solid currentColor}
  .badge.tl{color:var(--accent)}
  .badge.yp{color:var(--yp)}
  .badge.isk{color:var(--gold)}
  /* summary cards */
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:13px;margin:22px 0}
  .scard{border:1px solid var(--line);background:var(--card);padding:17px}
  .scard .k{font-size:10px;letter-spacing:1px;color:var(--muted);font-weight:700;text-transform:uppercase}
  .scard .v{font-size:23px;font-weight:700;margin-top:7px;font-variant-numeric:tabular-nums;letter-spacing:0;color:var(--accent)}
  .scard.win{border-color:var(--win)}
  .scard.win .v{color:var(--win)}
  .scard.yield{border-color:var(--purple);background:var(--purple-l)}
  .scard.yield .v{color:var(--gold)}
  .scard .v small{font-size:13px;font-weight:600;color:var(--muted)}
  .note{font-size:11px;color:var(--muted);margin-top:7px}
  .empty{padding:36px;text-align:center;color:var(--muted);font-size:13px;border:1px dashed var(--line);background:var(--card)}
  .seclabel{font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple);font-weight:800;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .hide{display:none}
  .crow{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end;margin-bottom:10px}
  .crow .x{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:11px 14px;cursor:pointer;font-size:14px;transition:.12s}
  .crow .x:hover{background:var(--danger);color:#fff}
  .wedflag{font-size:10px;letter-spacing:.5px;margin-left:6px;text-transform:none;font-weight:600}
  .list-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 15px;border:1px solid var(--line);background:var(--card);margin-bottom:8px;cursor:pointer;transition:.12s}
  .list-item:hover{border-color:var(--purple);background:var(--purple-l)}
  .list-item.picked{border-color:var(--purple);box-shadow:0 0 0 1px var(--purple),0 0 12px rgba(255,140,0,.2);background:var(--purple-l)}
  .li-main{font-weight:700;font-size:15px;color:var(--accent)}
  .li-sub{font-size:11px;color:var(--muted);margin-top:3px}
  .li-date{font-size:12.5px;color:var(--purple);margin-top:4px;font-weight:700}
  .card-box{border:1px solid var(--line);background:var(--card);padding:18px;margin-bottom:18px}
  .cf-head{display:flex;align-items:center;justify-content:space-between;margin:26px 0 10px}
  #bxtBtn.on{background:var(--gold)}
  .suggest-box{position:absolute;left:0;right:0;top:100%;z-index:50;background:var(--card);border:1px solid var(--purple);border-top:none;max-height:260px;overflow-y:auto;box-shadow:0 6px 16px rgba(10,42,102,.15)}
  .suggest-item{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13px}
  .suggest-item:hover,.suggest-item.active{background:var(--purple-l)}
  .suggest-item .si-isin{font-weight:700;color:var(--purple)}
  .suggest-item .si-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .site-footer{margin-top:48px;padding-top:18px;border-top:1px solid var(--line);text-align:center;color:var(--muted);font-size:12px;letter-spacing:3px;font-weight:600}
  @media(max-width:600px){.row{grid-template-columns:1fr}.cur-choice{flex-direction:column}.wrap{padding:20px 14px 60px}}
</style>
</head>
<body>
<div class="wrap">
  <header style="justify-content:space-between">
    <div>
      <h1>Bono/Tahvil Getiri Hesaplama</h1>
    </div>
    <button class="btn" id="bxtBtn" style="padding:9px 18px;font-size:13px" onclick="toggleBxt()">BXT</button>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('hesap')">Hesaplama</button>
    <button class="tab" onclick="showTab('tanim')">Kıymet Tanımı</button>
  </div>

  <!-- ============ BXT EKRANI ============ -->
  <div id="panel-bxt" class="panel" style="display:none">
    <div class="seclabel" style="margin-top:0">BXT — Fiyat / Getiri Ekranı</div>
    <div class="card-box">
      <div class="row">
        <div class="field" style="position:relative">
          <label>ISIN veya Banka Kodu</label>
          <input type="text" id="bxtKod" autocomplete="off" oninput="bxtSuggest()" onfocus="bxtSuggest()" placeholder="örn. TRT050935T13 veya 750">
          <div id="bxtSuggestBox" class="suggest-box" style="display:none"></div>
        </div>
        <div class="field">
          <label>Valör Tarihi</label>
          <input type="date" id="bxtValor" oninput="bxtRecalc('valor')">
        </div>
      </div>
      <div id="bxtInfo" class="li-date" style="display:none;margin-bottom:14px"></div>
      <div class="row">
        <div class="field">
          <label>Temiz Fiyat</label>
          <input type="text" inputmode="decimal" id="bxtTemiz" oninput="bxtRecalc('temiz')" placeholder="—">
        </div>
        <div class="field">
          <label>Yıllık Basit Getiri (%)</label>
          <input type="text" inputmode="decimal" id="bxtGetiri" oninput="bxtRecalc('getiri')" placeholder="—">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Kirli Fiyat</label>
          <input type="text" id="bxtKirli" readonly placeholder="—" style="background:var(--bg2)">
        </div>
        <div class="field">
          <label>Yıllık Bileşik Getiri (%)</label>
          <input type="text" inputmode="decimal" id="bxtBilesik" oninput="bxtRecalc('bilesik')" placeholder="—">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>İşlemiş Kupon (Accrued)</label>
          <input type="text" id="bxtAccrued" readonly placeholder="—" style="background:var(--bg2)">
        </div>
        <div class="field"></div>
      </div>
    </div>
  </div>

  <!-- ============ HESAPLAMA ============ -->
  <div id="panel-hesap" class="panel active">
    <div class="cur-choice">
      <div class="cur-pill" id="pill-TL" onclick="selectCur('TL')">
        <div class="big">TL DİBS</div><div class="lbl">Türk Lirası Devlet İç Borçlanma Senetleri</div>
      </div>
      <div class="cur-pill yp" id="pill-YP" onclick="selectCur('YP')">
        <div class="big">YP DİBS</div><div class="lbl">Döviz Cinsi Devlet İç Borçlanma Senetleri</div>
      </div>
    </div>

    <div id="kymList" class="hide">
      <div class="seclabel" id="kymListLabel">Kıymet Seçin</div>
      <div id="kymItems"></div>
    </div>

    <div id="calcForm" class="hide">
      <div class="card-box">
      <div class="seclabel" style="margin-top:0">Hesaplama Girdileri — <span id="selKymName"></span></div>
      <div class="row">
        <div class="field">
          <label>Valör Tarihi</label>
          <input type="date" id="inValor" oninput="onValorChange()">
        </div>
        <div class="field"></div>
      </div>
      <div class="row">
        <div class="field">
          <label>Kirli Fiyat</label>
          <input type="text" inputmode="decimal" id="inFiyat" oninput="onFiyatInput()" placeholder="örn. 100,250">
        </div>
        <div class="field" id="getiriField" style="display:none;order:-1">
          <label>Yıllık Basit Getiri (%)</label>
          <input type="text" inputmode="decimal" id="inGetiri" oninput="onGetiriInput(this)" placeholder="örn. 42,50">
        </div>
        <div class="field" id="tutarField">
          <label>Tutar (<span id="curLabel">TL</span>)</label>
          <input type="text" inputmode="decimal" id="inTutar" oninput="formatTutar(this)" placeholder="örn. 1.000.000">
        </div>
      </div>
      <div class="row" id="tutarRowAlt" style="display:none">
        <div class="field">
          <label>Tutar (<span id="curLabel2">TL</span>)</label>
          <input type="text" inputmode="decimal" id="inTutarAlt" oninput="formatTutar(this)" placeholder="örn. 1.000.000">
        </div>
        <div class="field"></div>
      </div>
      <button class="btn" onclick="hesapla()">Hesapla</button>
      </div>
    </div>

    <div id="result"></div>
  </div>

  <!-- ============ KIYMET TANIMI ============ -->
  <div id="panel-tanim" class="panel">
    <div class="seclabel" id="formTitle">Yeni Kıymet Tanımla</div>
    <div class="row">
      <div class="field">
        <label>Kıymet Türü</label>
        <select id="dType" onchange="onTypeChange()">
          <option value="TL_KUPON">TL Sabit Kuponlu</option>
          <option value="YP_KUPON">YP Sabit Kuponlu</option>
          <option value="ISKONTO">İskontolu</option>
        </select>
      </div>
      <div class="field"><label>ISIN</label><input type="text" id="dISIN" placeholder="TRT..."></div>
    </div>
    <div class="row">
      <div class="field"><label>Banka Kodu</label><input type="text" id="dBank" placeholder="örn. 0042"></div>
      <div class="field"></div>
    </div>
    <div class="row" id="ccyRow" style="display:none">
      <div class="field">
        <label>Para Birimi (YP)</label>
        <select id="dCcy"><option value="USD">USD</option><option value="EUR">EUR</option></select>
      </div>
      <div class="field"></div>
    </div>
    <div class="row">
      <div class="field"><label>İhraç / Başlangıç Tarihi</label><input type="date" id="dStart"></div>
      <div class="field"><label>İtfa (Vade) Tarihi</label><input type="date" id="dMaturity"></div>
    </div>
    <div id="couponBlock">
      <label style="margin-bottom:10px">Kupon Ödemeleri — her satıra tarih ve o döneme ait kupon oranını (%) girin</label>
      <div id="couponRows"></div>
      <button class="btn ghost" style="padding:8px 16px;font-size:11px" onclick="addCouponRow()">+ Kupon Ekle</button>
    </div>
    <br>
    <button class="btn" id="saveBtn" onclick="saveKym()">Kıymeti Kaydet</button>
    <button class="btn ghost" id="cancelBtn" style="display:none;margin-left:8px" onclick="resetForm()">İptal</button>

    <div class="seclabel">Tanımlı Kıymetler</div>
    <div style="border:1px solid var(--line);background:var(--card);padding:14px;margin-bottom:16px">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <button class="btn" onclick="downloadData()">Listeyi Dosyaya İndir (data.json)</button>
        <button class="btn ghost" onclick="document.getElementById('fileInput').click()">Dosyadan Yükle</button>
        <input type="file" id="fileInput" accept=".json,application/json" style="display:none" onchange="loadFromFile(this)">
        <span class="li-sub" id="exportMsg"></span>
      </div>
      <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <button class="btn ghost" style="font-size:11px;padding:7px 14px" onclick="exportList()">Panoya Kopyala</button>
        <button class="btn ghost" style="font-size:11px;padding:7px 14px" onclick="toggleImport()">Metinden Yükle</button>
      </div>
      <div id="importBox" style="display:none;margin-top:12px">
        <label>Dışa aktarılan metni buraya yapıştırıp "Yükle"ye basın</label>
        <textarea id="importText" style="width:100%;min-height:90px;font-family:monospace;font-size:11px;padding:10px;border:1px solid var(--line)"></textarea>
        <button class="btn" style="margin-top:8px" onclick="importList()">Yükle</button>
      </div>
    </div>
    <div id="defTL"></div>
    <div id="defYP"></div>
    <div id="defISK"></div>
  </div>
  <footer class="site-footer">ABS 2026</footer>
</div>

<script>

let userKymetler = JSON.parse(localStorage.getItem('userKymetler')||'[]');
let seedOverrides = JSON.parse(localStorage.getItem('seedOverrides')||'{}');
let deletedSeeds = JSON.parse(localStorage.getItem('deletedSeeds')||'{}');
// eski kayıtlardaki ad içine sızmış (USD)/(EUR) parantezlerini temizle
function _stripCcyParen(n){ return String(n||'').replace(/\s*\((USD|EUR)\)\s*/gi,'').trim(); }
userKymetler.forEach(k=>{ if(k && k.name) k.name=_stripCcyParen(k.name); });
Object.values(seedOverrides).forEach(k=>{ if(k && k.name) k.name=_stripCcyParen(k.name); });
function buildKymetler(){
  const seeds = SEED_KYMETLER
    .filter(k=> !deletedSeeds[k.id])   // silinmiş gömülü kıymetleri hariç tut
    .map(k=>{
      const ov = seedOverrides[k.id];
      return ov ? {...ov, id:k.id, _seed:true, _edited:true} : {...k, _seed:true};
    });
  // ISIN+tür bazında tekilleştir: gömülü kayıt önce gelir, kullanıcı kopyası elenir
  const combined = [...seeds, ...userKymetler];
  const seen = new Set();
  const unique = [];
  for(const k of combined){
    const key = (k.isin||k.name)+'|'+k.type;
    if(seen.has(key)) continue;
    seen.add(key); unique.push(k);
  }
  return unique;
}
let kymetler = buildKymetler();
function save(){
  userKymetler = kymetler.filter(k=>!k._seed);
  seedOverrides = {};
  kymetler.filter(k=>k._seed && k._edited).forEach(k=>{ seedOverrides[k.id] = k; });
  localStorage.setItem('userKymetler', JSON.stringify(userKymetler));
  localStorage.setItem('seedOverrides', JSON.stringify(seedOverrides));
}

/* ---------- tab ---------- */
function showTab(t){
  // BXT açıksa kapat
  const bxt=document.getElementById('panel-bxt');
  if(bxt){ bxt.style.display='none'; bxt.classList.remove('active'); document.getElementById('bxtBtn')?.classList.remove('on'); }
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='tanim') renderDefs();
}

/* ---------- kıymet tanımı ---------- */
function onTypeChange(){
  const t = document.getElementById('dType').value;
  document.getElementById('couponBlock').style.display = (t==='ISKONTO')?'none':'block';
  document.getElementById('ccyRow').style.display = (t==='YP_KUPON')?'grid':'none';
  if(t!=='ISKONTO' && document.getElementById('couponRows').children.length===0) addCouponRow();
}
function addCouponRow(date='', rate=''){
  const div = document.createElement('div');
  div.className='crow';
  div.innerHTML = `
    <div><label>Kupon Tarihi <span class="wedflag"></span></label><input type="date" class="c-date" value="${date}" onchange="flagWed(this)"></div>
    <div><label>Kupon Oranı (%)</label><input type="text" inputmode="decimal" class="c-rate" value="${rate}" placeholder="örn. 12,75"></div>
    <button class="x" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('couponRows').appendChild(div);
  const inp = div.querySelector('.c-date'); if(date) flagWed(inp);
}
function flagWed(inp){
  const flag = inp.closest('.crow').querySelector('.wedflag');
  if(!inp.value){ flag.textContent=''; return; }
  const isWed = new Date(inp.value+'T00:00:00').getDay()===3;
  flag.textContent = isWed ? '✓ Çarşamba' : '⚠ Çarşamba değil';
  flag.style.color = isWed ? 'var(--win)' : 'var(--danger)';
}

    document.querySelectorAll('#couponRows .crow').forEach(r=>{

      const rt=parseRate(r.querySelector('.c-rate').value);
      if(d && rt) coupons.push({date:d, rate:rt});
    });
    if(!coupons.length){ alert('En az bir kupon (tarih + oran) girin.'); return; }
    coupons.sort((a,b)=> new Date(a.date)-new Date(b.date));
    // Çarşamba olmayan kupon varsa kaydı engelleme; sadece bilgilendir
    const notWed = coupons.filter(c=> new Date(c.date+'T00:00:00').getDay()!==3);
    if(notWed.length) wedWarnMsg = notWed.length+' kupon tarihi Çarşamba değil ('+notWed.map(c=>fmtDate(c.date)).join(', ')+') — yine de kaydedildi.';
  }
  const data = {
    type: t, cur, name,
    isin: isin,
    bank: document.getElementById('dBank').value.trim(),
    start: document.getElementById('dStart').value,
    maturity, coupons
  };
  if(t==='YP_KUPON') data.ccy = document.getElementById('dCcy').value;
  if(editingId!==null){
    const idx = kymetler.findIndex(k=>k.id===editingId);
    const wasSeed = kymetler[idx]._seed;
    kymetler[idx] = {...data, id:editingId, _seed:wasSeed, _edited: wasSeed?true:undefined};
    save(); renderDefs(); resetForm();
    alert('Kıymet güncellendi: '+name + (wedWarnMsg?'\n\n⚠ '+wedWarnMsg:''));
  } else {
    kymetler.push({...data, id:Date.now()});
    save(); renderDefs(); resetForm();
    alert('Kıymet kaydedildi: '+name + (wedWarnMsg?'\n\n⚠ '+wedWarnMsg:''));
  }
}

function loadFromFile(input){
  const f = input.files && input.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    let arr;
    try{ arr = JSON.parse(e.target.result); }catch(err){ alert('Dosya geçerli değil (JSON hatası): '+err.message); return; }
    if(!Array.isArray(arr)){ alert('Beklenen biçim bir liste değil.'); return; }
    if(!confirm(arr.length+' kıymet yüklenecek. Mevcut liste bununla değiştirilsin mi?')) { input.value=''; return; }
    userKymetler = arr.map(({_seed,_edited,...k})=>k);
    seedOverrides = {}; deletedSeeds = {};
    localStorage.setItem('userKymetler', JSON.stringify(userKymetler));
    localStorage.setItem('seedOverrides', JSON.stringify(seedOverrides));
    localStorage.setItem('deletedSeeds', JSON.stringify(deletedSeeds));
    const userIds = new Set(userKymetler.map(k=>k.id));
    const seeds = SEED_KYMETLER.filter(k=>!userIds.has(k.id)).map(k=>({...k,_seed:true}));
    kymetler = [...seeds, ...userKymetler];
    renderDefs();
    const msg = document.getElementById('exportMsg');
    msg.textContent = '✓ '+arr.length+' kıymet yüklendi';
    msg.style.color = 'var(--win)';
    input.value='';
  };
  reader.readAsText(f);
}

// BXT valör → gün ve accrued hesapları
function bxtValorDate(){
  const v=document.getElementById('bxtValor').value;
  return v? new Date(v+'T00:00:00') : new Date(new Date().setHours(0,0,0,0));
}
// İşlemiş kupon (accrued), nominal 100 bazında — kuponlularda
// Genel işlemiş kupon (accrued) — nominal 100 bazında. Kuponlu kıymetler için.
function accruedCalc(kym, valor){
  if(!kym || kym.type==='ISKONTO' || !kym.coupons || !kym.coupons.length) return 0;
  const dates=kym.coupons.map(c=>new Date(c.date+'T00:00:00')).sort((a,b)=>a-b);
  let prev=null,next=null;
  for(const d of dates){ if(d<=valor) prev=d; else { next=d; break; } }
  if(!next) return 0;
  if(!prev) prev=new Date(next.getTime()-182*86400000);
  const gecen=Math.round((valor-prev)/86400000);
  const oran=kym.coupons.find(c=> c.date===next.toISOString().slice(0,10))?.rate ?? kym.coupons[0].rate;
  return oran*(gecen/182);
}
function bxtAccruedCalc(){
  if(!bxtKym) return 0;
  return accruedCalc(bxtKym, bxtValorDate());
}
// Kirli fiyattan getiri (100 bazında) — site mantığıyla aynı
function bxtGetiriFromKirli(kirli100){
  const valor=bxtValorDate();
  if(bxtKym.type==='ISKONTO'){
    const itfa=new Date(bxtKym.maturity+'T00:00:00');
    const gun=Math.round((itfa-valor)/86400000);
    if(gun<=0) return null;
    return ((100-kirli100)/kirli100)*(365/gun)*100;
  }
  const fut=(bxtKym.coupons||[]).filter(c=>new Date(c.date+'T00:00:00')>valor).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!fut.length) return null;
  const flows=fut.map(c=>({g:Math.round((new Date(c.date+'T00:00:00')-valor)/86400000),t:c.rate}));
  flows[flows.length-1].t+=100;
  if(flows.length===1 && flows[0].g<=182){
    return ((flows[0].t-kirli100)/kirli100)*(365/flows[0].g)*100;
  }
  const firstFrac=flows[0].g/182;
  const npv=(i)=>flows.reduce((s,f,idx)=>s+f.t/Math.pow(1+i,firstFrac+idx),0)-kirli100;
  let lo=-0.99,hi=5,mid;
  for(let it=0;it<200;it++){mid=(lo+hi)/2;if(npv(mid)>0)lo=mid;else hi=mid;}
  return mid*2*100;
}
// Getiriden kirli fiyat (100 bazında) — yukarıdakinin tersi
function bxtKirliFromGetiri(getiri){
  const valor=bxtValorDate();
  if(bxtKym.type==='ISKONTO'){
    const itfa=new Date(bxtKym.maturity+'T00:00:00');
    const gun=Math.round((itfa-valor)/86400000);
    if(gun<=0) return null;
    return 100/(1+(getiri/100)*(gun/365));
  }
  const fut=(bxtKym.coupons||[]).filter(c=>new Date(c.date+'T00:00:00')>valor).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!fut.length) return null;
  const flows=fut.map(c=>({g:Math.round((new Date(c.date+'T00:00:00')-valor)/86400000),t:c.rate}));
  flows[flows.length-1].t+=100;
  if(flows.length===1 && flows[0].g<=182){
    // basit faiz tersine: kirli = nakit/(1+getiri/100*gun/365)
    return flows[0].t/(1+(getiri/100)*(flows[0].g/365));
  }
  const i=getiri/2/100; // dönemsel oran
  const firstFrac=flows[0].g/182;
  return flows.reduce((s,f,idx)=>s+f.t/Math.pow(1+i,firstFrac+idx),0);
}
const bxtFmt=(n,d)=> Number(n).toLocaleString('tr-TR',{minimumFractionDigits:d,maximumFractionDigits:d});
// Ana senkron: hangi alan değiştiyse ona göre diğerlerini hesapla
function bxtRecalc(src){
  if(!bxtKym) return;
  const isYP = bxtKym.type==='YP_KUPON';
  const base = 100;                      // BXT ekranı: tüm kıymetlerde 100 bazlı fiyat
  const fiyatDec = 3;                    // 3 ondalık
  const accr100 = bxtAccruedCalc();      // 100 bazında accrued
  const elT=document.getElementById('bxtTemiz'), elK=document.getElementById('bxtKirli'),
        elG=document.getElementById('bxtGetiri'), elA=document.getElementById('bxtAccrued');
  // accrued'ı gösterim hassasiyetinde yuvarla (tutarlılık için bunu temel al)
  const accrDisp = Number((accr100*(base/100)).toFixed(fiyatDec)); // gösterilen accrued
  elA.value = bxtFmt(accrDisp, fiyatDec);

  // Gösterimde "kirli = temiz + accrued" her zaman tutsun:
  // kaynak alana göre birini yuvarla, diğerini yuvarlanmış accrued ile türet.
  function show(temiz100, kirli100, getiri, skip){
    let temizDisp = temiz100!=null ? Number((temiz100*(base/100)).toFixed(fiyatDec)) : null;
    let kirliDisp = kirli100!=null ? Number((kirli100*(base/100)).toFixed(fiyatDec)) : null;
    if(skip==='temiz' && temizDisp!=null){
      // kullanıcı temiz girdi: kirli = temiz(girilen) + accrued(yuvarlı)
      const tIn = parseTutar(document.getElementById('bxtTemiz').value);
      kirliDisp = Number((tIn + accrDisp).toFixed(fiyatDec));
    } else if(skip==='kirli' && kirliDisp!=null){
      // kullanıcı kirli girdi: temiz = kirli(girilen) − accrued(yuvarlı)
      const kIn = parseTutar(document.getElementById('bxtKirli').value);
      temizDisp = Number((kIn - accrDisp).toFixed(fiyatDec));
    } else if(temizDisp!=null){
      // getiriden geldi: TEMİZİ temel al (Bloomberg gibi), kirli = temiz + accrued
      kirliDisp = Number((temizDisp + accrDisp).toFixed(fiyatDec));
    }
    if(skip!=='temiz') elT.value = temizDisp!=null ? bxtFmt(temizDisp, fiyatDec) : '';
    if(skip!=='kirli') elK.value = kirliDisp!=null ? bxtFmt(kirliDisp, fiyatDec) : '';
    if(skip!=='getiri') elG.value = getiri!=null ? bxtFmt(getiri, 2) : '';
    // Yıllık bileşik getiri
    const elB = document.getElementById('bxtBilesik');
    if(getiri!=null){
      const s = getiri/100;
      let bilesik=null;
      const valor=bxtValorDate();
      if(bxtKym.type==='ISKONTO'){
        const itfa=new Date(bxtKym.maturity+'T00:00:00');
        const gun=Math.round((itfa-valor)/86400000);
        bilesik = gun>0 ? (Math.pow(1+s*(gun/365), 365/gun)-1)*100 : null;
      } else {
        const fut=(bxtKym.coupons||[]).filter(c=>new Date(c.date+'T00:00:00')>valor).sort((a,b)=>new Date(a.date)-new Date(b.date));
        if(fut.length){
          const flows=fut.map(c=>({g:Math.round((new Date(c.date+'T00:00:00')-valor)/86400000),t:c.rate}));
          flows[flows.length-1].t+=100;
          const gun0=flows[0].g;
          // kirli100: getiri zaten kirli100'den geldi; tekrar üret
          const kirli100=bxtKirliFromGetiri(getiri);
          if(flows.length===1 && gun0<182){
            // son dönem, bir dönemden kısa → para piyasası bileşiği
            bilesik = (Math.pow(1+s*(gun0/365), 365/gun0)-1)*100;
          } else if(kirli100!=null){
            // dönemsel IRR → efektif yıllık: (1+i)² − 1
            const firstFrac=gun0/182;
            const npv=i=>flows.reduce((a,f,idx)=>a+f.t/Math.pow(1+i,firstFrac+idx),0)-kirli100;
            let lo=-0.99,hi=5,mid;
            for(let it=0;it<200;it++){mid=(lo+hi)/2;if(npv(mid)>0)lo=mid;else hi=mid;}
            bilesik=((1+mid)**2-1)*100;
          }
        }
      }
      elB.value = (skip!=='bilesik') ? (bilesik!=null ? bxtFmt(bilesik, 2) : '') : elB.value;
    } else {
      if(skip!=='bilesik') elB.value = '';
    }
  }

  if(src==='getiri'){
    let v=document.getElementById('bxtGetiri').value.replace(/[^\d,]/g,'');
    const getiri=parseRate(v);
    if(!getiri){ return; }
    const kirli100=bxtKirliFromGetiri(getiri);
    if(kirli100==null) return;
    const temiz100=kirli100-accr100;
    show(temiz100, kirli100, getiri, 'getiri');
  } else if(src==='temiz'){
    const temiz100=parseTutar(document.getElementById('bxtTemiz').value)/(base/100);
    if(!temiz100) return;
    const kirli100=temiz100+accr100;
    const getiri=bxtGetiriFromKirli(kirli100);
    show(temiz100, kirli100, getiri, 'temiz');
  } else if(src==='kirli'){
    const kirli100=parseTutar(document.getElementById('bxtKirli').value)/(base/100);
    if(!kirli100) return;
    const temiz100=kirli100-accr100;
    // Tutarlılık: getiriyi "temiz(3 hane) + tam accrued" kirlisinden hesapla
    const temiz3 = Number((temiz100).toFixed(3));
    const getiri=bxtGetiriFromKirli(temiz3+accr100);
    show(temiz100, kirli100, getiri, 'kirli');
  } else if(src==='bilesik'){
    let v=document.getElementById('bxtBilesik').value.replace(/[^\d,]/g,'');
    const bilesik=parseRate(v);
    if(!bilesik){ return; }
    // Bileşik → basit getiriye çevir (kıymet tipine göre)
    const b=bilesik/100;
    const valor=bxtValorDate();
    let getiri=null;
    if(bxtKym.type==='ISKONTO'){
      const itfa=new Date(bxtKym.maturity+'T00:00:00');
      const gun=Math.round((itfa-valor)/86400000);
      if(gun>0) getiri=(Math.pow(1+b, gun/365)-1)*(365/gun)*100;
    } else {
      const fut=(bxtKym.coupons||[]).filter(c=>new Date(c.date+'T00:00:00')>valor).sort((a,b)=>new Date(a.date)-new Date(b.date));
      if(fut.length){
        const gun0=Math.round((new Date(fut[0].date+'T00:00:00')-valor)/86400000);
        if(fut.length===1 && gun0<182){
          // son dönem para piyasası: basit = ((1+bileşik)^(gün/365)−1)×(365/gün)
          getiri=(Math.pow(1+b, gun0/365)-1)*(365/gun0)*100;
        } else {
          // çok dönem: efektif yıllık → dönemsel → ×2: basit = ((1+bileşik)^0.5 − 1)×2
          getiri=((Math.pow(1+b, 0.5))-1)*2*100;
        }
      }
    }
    if(getiri==null) return;
    const kirli100=bxtKirliFromGetiri(getiri);
    if(kirli100==null) return;
    const temiz100=kirli100-accr100;
    show(temiz100, kirli100, getiri, 'bilesik');
  } else {
    // kod veya valör değişti: mevcut bir değer varsa onu koru
    const gv=parseRate(document.getElementById('bxtGetiri').value);
    const tv=parseTutar(document.getElementById('bxtTemiz').value);
    const bv=parseRate(document.getElementById('bxtBilesik').value);
    if(gv){ bxtRecalc('getiri'); }
    else if(tv){ bxtRecalc('temiz'); }
    else if(bv){ bxtRecalc('bilesik'); }
    else { elA.value = bxtFmt(accr100*(base/100), fiyatDec); }
  }
}


// İskontolu kıymet için valöre kalan gün
function vadeGunIsk(){
  if(!selKym) return 0;
  const valorStr = document.getElementById('inValor').value;
  const valor = valorStr ? new Date(valorStr+'T00:00:00') : new Date(new Date().setHours(0,0,0,0));
  const itfa = new Date(selKym.maturity+'T00:00:00');
  return Math.round((itfa - valor)/86400000);
}
// Kirli fiyat yazılınca getiriyi anlık hesapla (sadece iskontolu)
function onFiyatInput(){
  if(!selKym || selKym.type!=='ISKONTO') return;
  const fiyat = parseRate(document.getElementById('inFiyat').value);
  const gun = vadeGunIsk();
  const gEl = document.getElementById('inGetiri');
  if(!fiyat || fiyat<=0 || gun<=0){ gEl.value=''; return; }
  const getiri = ((100-fiyat)/fiyat)*(365/gun)*100;
  gEl.value = getiri.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
// Getiri yazılınca fiyatı anlık hesapla; girişte virgülden sonra 2 hane sınırı
function onGetiriInput(inp){
  if(!selKym || selKym.type!=='ISKONTO') return;
  // sadece rakam ve tek virgül, virgülden sonra en fazla 2 hane
  let v = inp.value.replace(/[^\d,]/g,'');
  const parts = v.split(',');
  if(parts.length>2) v = parts[0]+','+parts.slice(1).join('');
  v = v.replace(/^(\d*),(\d{0,2}).*$/, (m,a,b)=> b!==undefined && v.includes(',') ? a+','+b : a);
  inp.value = v;
  const getiri = parseRate(v);
  const gun = vadeGunIsk();
  const fEl = document.getElementById('inFiyat');
  if(!getiri || gun<=0){ fEl.value=''; return; }
  const fiyat = 100/(1+(getiri/100)*(gun/365));
  fEl.value = fiyat.toLocaleString('tr-TR',{minimumFractionDigits:3,maximumFractionDigits:3});
}

// Valör değişince (iskontolu): getiri sabit kalsın, fiyatı yeniden hesapla.
// Getiri boşsa fiyattan getiriyi hesapla.
function onValorChange(){
  if(!selKym || selKym.type!=='ISKONTO') return;
  const gEl = document.getElementById('inGetiri');
  const fEl = document.getElementById('inFiyat');
  const getiri = parseRate(gEl.value);
  const gun = vadeGunIsk();
  if(getiri && gun>0){
    // getiri sabit → fiyatı güncelle (getiriye dokunma, oynama olmasın)
    const fiyat = 100/(1+(getiri/100)*(gun/365));
    fEl.value = fiyat.toLocaleString('tr-TR',{minimumFractionDigits:3,maximumFractionDigits:3});
  } else {
    // getiri boşsa fiyattan getiriyi hesapla
    onFiyatInput();
  }
}
function cleanName(name){ return String(name||'').replace(/\s*\((USD|EUR)\)\s*/gi,'').trim(); }
function displayName(k){
  const base = cleanName(k.name);
  return base + (k.ccy ? ' ('+k.ccy+')' : '');
}

// Tutar inputuna binlik nokta ayraci ekler (TR formati: nokta=binlik, virgul=ondalik)
function formatTutar(inp){
  let v = inp.value;
  // izin verilen karakterler: rakam ve virgul
  v = v.replace(/[^\d,]/g,'');
  let [tam, ...ond] = v.split(',');
  tam = tam.replace(/^0+(?=\d)/,''); // bastaki sifirlari at
  // binlik gruplama
  tam = tam.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  inp.value = ond.length ? tam+','+ond.join('').slice(0,4) : tam;
}
// "2.000.000,50" -> 2000000.50
function parseTutar(s){
  if(!s) return NaN;
  return parseFloat(String(s).replace(/\./g,'').replace(',','.'));
}
// Oran gibi tek ondalıklı değerler için: hem nokta hem virgül ondalık sayılır
function parseRate(s){
  if(s===''||s==null) return NaN;
  return parseFloat(String(s).replace(',','.'));
}

function hesapla(){
  if(!selKym){ alert('Kıymet seçin.'); return; }
  const fiyat = parseTutar(document.getElementById('inFiyat').value);
  const tutarEl = (selKym.type==='ISKONTO') ? 'inTutarAlt' : 'inTutar';
  const tutar = parseTutar(document.getElementById(tutarEl).value);
  if(!fiyat||fiyat<=0){ alert('Geçerli fiyat girin.'); return; }
  if(!tutar||tutar<=0){ alert('Geçerli tutar girin.'); return; }

  // YP kuponlu: par değeri 1000, yuvarlama 1000; diğerleri (TL): par 100, yuvarlama 10
  const isYP = (selKym.type==='YP_KUPON');
  const par = isYP ? 1000 : 100;
  const step = isYP ? 1000 : 10;
  const adetRaw = (tutar*par)/fiyat;
  const adet = floorTo(adetRaw, step);
  const yatirilan = (adet*fiyat)/par;

  let rows=[], toplamKupon=0;
  // valör tarihi: kuponlar bu tarihten SONRA ödeniyorsa alınır (valör günü veya öncesi alınmaz)
  const valorStr = document.getElementById('inValor').value;
  const valor = valorStr ? new Date(valorStr+'T00:00:00') : new Date(new Date().setHours(0,0,0,0));
  if(selKym.type!=='ISKONTO' && selKym.coupons){
    const future = selKym.coupons.filter(c=> new Date(c.date+'T00:00:00') > valor);
    future.forEach((c,i)=>{
      const k = adet * (c.rate/100);   // kupon = adet × oran
      toplamKupon += k;
      rows.push({lbl:`Kupon Ödemesi #${i+1} (%${Number(c.rate).toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:4})})`, date:fmtDate(c.date), val:k});
    });
  }
  const anapara = adet;                 // vade sonu anapara = elindeki adet
  const kazanc = (toplamKupon + anapara) - yatirilan;
  const cur = selKym.ccy || selKym.cur;

  // Yıllık getiri hesabı
  const itfaDate = new Date(selKym.maturity+'T00:00:00');
  const vadeGun = Math.round((itfaDate - valor)/86400000);
  let basitGetiri = null, getiriNot = '';
  if(selKym.type==='ISKONTO'){
    // İskontolu: basit getiri = (anapara − yatırılan)/yatırılan × (365/vadeGün) × 100
    if(vadeGun>0){ basitGetiri = ((anapara - yatirilan)/yatirilan)*(365/vadeGun)*100; getiriNot = `${vadeGun} gün · 365 bazlı`; }
  } else {
    // Kuponlu: Bloomberg yöntemi — dönemsel IRR × 2 (bond-equivalent yield)
    // Nakit akışları nominal (100) bazında: her kupon = dönem oranı, son ödemede +100 anapara
    const fut = (selKym.coupons||[]).filter(c=> new Date(c.date+'T00:00:00') > valor)
                  .sort((a,b)=> new Date(a.date)-new Date(b.date));
    if(fut.length){
      const flows = fut.map(c=>({g: Math.round((new Date(c.date+'T00:00:00')-valor)/86400000), t: c.rate}));
      flows[flows.length-1].t += 100;   // anapara (nominal 100 bazında)
      // Fiyatı 100 bazına normalize et: YP'de fiyat 1000 bazlı girilir (örn. 1027,30 → 102,730)
      let fiyat100 = isYP ? (fiyat/10) : fiyat;
      // Tutarlılık: getiri daima "temiz + tam accrued" kirlisinden hesaplanır.
      // Kullanıcı kirli girer; temizi 3 haneye yuvarla, sonra tam accrued ile geri ekle.
      const accr100 = accruedCalc(selKym, valor);
      if(accr100>0){
        const temiz100 = Number((fiyat100 - accr100).toFixed(3));
        fiyat100 = temiz100 + accr100;
      }
      if(flows.length===1 && flows[0].g<=182){
        // Son kupon dönemi: tek ödeme kaldı ve 1 dönemden yakın → basit faiz (para piyasası)
        basitGetiri = ((flows[0].t - fiyat100)/fiyat100)*(365/flows[0].g)*100;
        getiriNot = `Basit faiz · ${flows[0].g} gün · 365 bazlı`;
      } else {
        // Bloomberg yöntemi: dönemsel IRR × 2 (bond-equivalent yield)
        const firstFrac = flows[0].g/182; // ilk kupona kesirli dönem
        const npv = (i)=> flows.reduce((s,f,idx)=> s + f.t/Math.pow(1+i, firstFrac+idx), 0) - fiyat100;
        let lo=-0.99, hi=5, mid;
        for(let it=0; it<200; it++){ mid=(lo+hi)/2; if(npv(mid)>0) lo=mid; else hi=mid; }
        basitGetiri = mid*2*100;          // yıllıklandır
        getiriNot = `Dönemsel %${fmtNum(mid*100,4)} × 2`;
      }
    }
  }

  let html = `<div class="seclabel">Sonuç — ${displayName(selKym)}</div>`;
  html += `<div class="summary">
    <div class="scard"><div class="k">Yatırılan Tutar</div><div class="v">${fmtNum(yatirilan,2)} <small>${cur}</small></div></div>
    <div class="scard"><div class="k">Toplam Geri Dönüş Tutarı</div><div class="v">${fmtNum(toplamKupon+anapara,2)} <small>${cur}</small></div></div>
    <div class="scard win"><div class="k">Toplam Kazanç</div><div class="v">${fmtNum(kazanc,2)} <small>${cur}</small></div></div>
    ${basitGetiri!==null?`<div class="scard yield"><div class="k">Yıllık Basit Getiri</div><div class="v">%${fmtNum(basitGetiri,2)}</div><div class="note">${getiriNot}</div></div>`:''}
  </div>`;

  html += `<div class="cf-head">
    <span class="seclabel" style="margin:0;border:none;padding:0">Nakit Akış Tablosu</span>
    <button class="btn ghost" style="padding:7px 14px;font-size:11px" onclick="copyCashflow(this)">Kopyala</button>
  </div>`;
  html += `<table id="cfTable"><thead><tr><th>${selKym.bank?selKym.bank+'-':''}${selKym.isin||selKym.name}</th><th>Tarih</th><th class="num">Tutar (${cur})</th></tr></thead><tbody>`;
  html += `<tr class="invest"><td>Yatırılan Tutar</td><td>${fmtDate(valor)}</td><td class="num">${fmtNum(yatirilan,2)}</td></tr>`;
  rows.forEach(r=>{ html += `<tr><td>${r.lbl}</td><td>${r.date}</td><td class="num">${fmtNum(r.val,2)}</td></tr>`; });
  html += `<tr><td>Anapara Dönüşü</td><td>${fmtDate(selKym.maturity)}</td><td class="num">${fmtNum(anapara,2)}</td></tr>`;
  html += `<tr class="subtotal"><td>Toplam Geri Dönüş Tutarı</td><td>—</td><td class="num">${fmtNum(toplamKupon+anapara,2)}</td></tr>`;
  html += `<tr class="total"><td>Toplam Kazanç</td><td>—</td><td class="num">${fmtNum(kazanc,2)}</td></tr>`;
  html += `</tbody></table>`;
  document.getElementById('result').innerHTML = html;
}

/* ---------- yardımcılar ---------- */
function copyCashflow(btn){
  const table = document.getElementById('cfTable');
  if(!table) return;
  // Düz metin (TSV): Excel'e satır/sütun olarak yapışır
  let tsv = '';
  table.querySelectorAll('tr').forEach(tr=>{
    const cells = [...tr.querySelectorAll('th,td')].map(c=> c.textContent.trim());
    tsv += cells.join('\t') + '\n';
  });
  // Zengin HTML: Outlook/Word/Excel'e biçimli tablo olarak yapışır
  const htmlTable = '<table border="1" cellspacing="0" cellpadding="4" style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:13px">'
    + table.innerHTML + '</table>';
  const okMsg = ()=>{ const t=btn.textContent; btn.textContent='✓ Kopyalandı'; setTimeout(()=>btn.textContent=t,1500); };
  if(navigator.clipboard && window.ClipboardItem){
    const item = new ClipboardItem({
      'text/plain': new Blob([tsv], {type:'text/plain'}),
      'text/html': new Blob([htmlTable], {type:'text/html'})
    });
    navigator.clipboard.write([item]).then(okMsg).catch(()=>{
      navigator.clipboard.writeText(tsv).then(okMsg).catch(()=>alert('Kopyalanamadı.'));
    });
  } else {
    navigator.clipboard.writeText(tsv).then(okMsg).catch(()=>alert('Kopyalanamadı.'));
  }
}
function fmtNum(n,dec){ return Number(n).toLocaleString('tr-TR',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function fmtDate(d){ if(!d) return '—'; const x=new Date(d); return x.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'}); }

onTypeChange();
renderDefs();

// Açılışta data.json varsa ortak listeyi oradan yükle (gömülü liste yedek kalır)
(function loadSharedData(){
  fetch('data.json?v='+Date.now())
    .then(r=> r.ok ? r.json() : Promise.reject())
    .then(arr=>{
      if(Array.isArray(arr) && arr.length){
        // data.json'daki liste ana kaynak: kullanıcı düzenlemeleri/silmeleri yine üstüne uygulanır
        const cleaned = arr.map(({_seed,_edited,...k})=>k);
        const userIds = new Set(userKymetler.map(k=>k.id));
        const base = cleaned
          .filter(k=> !deletedSeeds[k.id])
          .map(k=> seedOverrides[k.id] ? {...seedOverrides[k.id], id:k.id, _seed:true, _edited:true} : {...k, _seed:true})
          .filter(k=> !userIds.has(k.id));
        // ISIN+tür tekilleştir
        const seen=new Set(); const merged=[];
        for(const k of [...base, ...userKymetler]){
          const key=(k.isin||k.name)+'|'+k.type;
          if(seen.has(key)) continue; seen.add(key); merged.push(k);
        }
        kymetler = merged;
        renderDefs();
        // hesaplama ekranında seçim listesi açıksa tazele
        if(selCur) selectCur(selCur);
      }
    })
    .catch(()=>{ /* data.json yoksa gömülü liste kullanılır, sorun değil */ });
})();
